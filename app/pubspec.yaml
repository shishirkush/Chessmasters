name: chessmasters
description: Chess Masters — slice 1 (authoritative live chess)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  cloud_functions: ^4.6.8
  # Board rendering only. Move LEGALITY is decided by the server, never here.
  flutter_chess_board: ^1.0.6
  # Used purely to turn server FEN into a board the widget can show.
  chess: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

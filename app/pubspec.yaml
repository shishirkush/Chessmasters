name: chessmasters
description: Chess Masters — slice 1 (authoritative live chess)
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  cloud_functions: ^4.6.8
  # Google Sign-In (6.x classic API, pairs with firebase_auth 4.x):
  # GoogleSignIn().signIn() -> authentication -> GoogleAuthProvider.credential.
  google_sign_in: ^6.2.1
  # Board rendering only. Move LEGALITY is decided by the server, never here.
  # simple_chess_board is display-only (does NOT enforce rules) which is the
  # correct fit for our server-authoritative design.
  simple_chess_board: ^1.9.0
  # Used purely to turn server FEN into a board the widget can show.
  chess: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
